<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - {{ site_name }}</title>
    <link href="/bbs/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/bbs/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 text-center">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <i class="bi bi-question-circle text-warning" style="font-size: 5rem;"></i>
                        <h1 class="display-1 fw-bold">404</h1>
                        <h2>Page Not Found</h2>
                        <p class="text-muted">The page you're looking for doesn't exist.</p>
                        {% if path then %}
                        <p class="small text-muted">Path: {{ path }}</p>
                        {% end %}
                        <a href="/bbs" class="btn btn-primary mt-3">
                            <i class="bi bi-house"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
