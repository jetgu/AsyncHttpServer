<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_title or 'Error' }} - {{ site_name }}</title>
    <link href="/bbs/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/bbs/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 text-center">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
                        <h2 class="mt-3">{{ error_title or 'Error' }}</h2>
                        <p class="text-muted">{{ error_message or 'An error occurred.' }}</p>
                        <a href="/bbs" class="btn btn-primary mt-3">
                            <i class="bi bi-house"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
