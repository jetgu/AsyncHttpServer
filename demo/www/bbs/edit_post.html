<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - {{ site_name }}</title>
    <link href="/bbs/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/bbs/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/bbs"><i class="bi bi-chat-square-text"></i> {{ site_name }}</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-pencil"></i> Edit Post
                    </div>
                    <div class="card-body">
                        {% if error_message then %}
                        <div class="alert alert-danger">{{ error_message }}</div>
                        {% end %}

                        <form method="POST" action="/bbs/edit-post?id={{ post.id }}">
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" name="category">
                                    <option value="">-- Select Category --</option>
                                    {% for i, cat in ipairs(categories or {}) do %}
                                    <option value="{{ cat.id }}" {% if post.category_id == cat.id then %}selected{% end %}>{{ cat.name }}</option>
                                    {% end %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Title *</label>
                                <input type="text" class="form-control" name="title" value="{{ post.title }}" minlength="3" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Content *</label>
                                <textarea class="form-control" name="content" rows="10" minlength="10" required>{{ post.content }}</textarea>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/bbs/post?id={{ post.id }}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check"></i> Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/bbs/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
