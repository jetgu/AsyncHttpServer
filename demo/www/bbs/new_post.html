<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post - {{ site_name }}</title>
    <link href="/bbs/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/bbs/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/bbs"><i class="bi bi-chat-square-text"></i> {{ site_name }}</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-plus-circle"></i> Create New Post
                    </div>
                    <div class="card-body">
                        {% if error_message then %}
                        <div class="alert alert-danger">{{ error_message }}</div>
                        {% end %}

                        <form method="POST" action="/bbs/new-post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Category *</label>
                                <select class="form-select" name="category" required>
                                    <option value="" disabled selected>-- Select Category --</option>
                                    {% for i, cat in ipairs(categories or {}) do %}
                                    <option value="{{ cat.id }}" {% if selected_category and selected_category == cat.id then %}selected{% end %}>{{ cat.name }}</option>
                                    {% end %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Title *</label>
                                <input type="text" class="form-control" name="title" value="{{ title or '' }}" minlength="3" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Content *</label>
                                <div class="position-relative">
                                    <textarea class="form-control" name="content" id="post-content" rows="10" minlength="10" required>{{ content or '' }}</textarea>
                                    <!-- Emoji Picker Toggle -->
                                    <button type="button" class="btn btn-sm btn-outline-secondary emoji-picker-btn" id="emoji-toggle" title="Insert Emoji">
                                        <i class="bi bi-emoji-smile"></i>
                                    </button>
                                    <!-- Emoji Picker Panel -->
                                    <div class="emoji-picker" id="emoji-picker" style="display: none;">
                                        <div class="emoji-picker-header">
                                            <span>Emojis</span>
                                            <button type="button" class="btn-close btn-sm" id="emoji-close"></button>
                                        </div>
                                        <div class="emoji-categories">
                                            <button type="button" class="emoji-cat-btn active" data-category="smileys">😀</button>
                                            <button type="button" class="emoji-cat-btn" data-category="gestures">👍</button>
                                            <button type="button" class="emoji-cat-btn" data-category="hearts">❤️</button>
                                            <button type="button" class="emoji-cat-btn" data-category="animals">🐱</button>
                                            <button type="button" class="emoji-cat-btn" data-category="food">🍕</button>
                                            <button type="button" class="emoji-cat-btn" data-category="objects">⚽</button>
                                            <button type="button" class="emoji-cat-btn" data-category="symbols">✅</button>
                                        </div>
                                        <div class="emoji-grid" id="emoji-grid">
                                            <!-- Emojis will be inserted here by JS -->
                                        </div>
                                    </div>
                                </div>
                                <div class="form-text">Supports basic HTML formatting</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Attachment (optional)</label>
                                <input type="file" class="form-control" name="attachment" accept=".jpg,.jpeg,.png,.gif,.pdf,.zip,.txt">
                                <div class="form-text">Allowed: jpg, jpeg, png, gif, pdf, zip, txt (max 10MB)</div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/bbs" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-send"></i> Create Post
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/bbs/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
    // Emoji data by category
    var emojiData = {
        smileys: ['😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '🙂', '😊', '😇', '🥰', '😍', '🤩', '😘', '😗', '😚', '😋', '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭', '🤫', '🤔', '🤐', '🤨', '😐', '😑', '😶', '😏', '😒', '🙄', '😬', '😮', '🤯', '😴', '🥱', '😷', '🤒', '🤕', '🤢', '🤮', '🥵', '🥶', '😵', '🤠', '🥳', '🥸', '😎', '🤓', '🧐'],
        gestures: ['👍', '👎', '👊', '✊', '🤛', '🤜', '👏', '🙌', '👐', '🤲', '🤝', '🙏', '✌️', '🤞', '🤟', '🤘', '🤙', '👈', '👉', '👆', '👇', '☝️', '✋', '🤚', '🖐️', '🖖', '👋', '🤏', '✍️', '🤳', '💪', '🦾', '🦿', '🦵', '🦶', '👂', '🦻', '👃', '👀', '👁️', '👅', '👄', '💋'],
        hearts: ['❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝', '💟', '♥️', '😻', '💌', '💐', '🌹', '🥀', '🌷', '🌸', '💮', '🏵️', '🌻', '🌼'],
        animals: ['🐱', '🐶', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦆', '🦅', '🦉', '🦇', '🐺', '🐗', '🐴', '🦄', '🐝', '🐛', '🦋', '🐌', '🐞', '🐜', '🦟', '🐢', '🐍', '🦎', '🦖', '🦕', '🐙', '🦑', '🦐', '🦞', '🦀', '🐡', '🐠', '🐟', '🐬', '🐳', '🐋', '🦈', '🐊'],
        food: ['🍕', '🍔', '🍟', '🌭', '🍿', '🧂', '🥓', '🥚', '🍳', '🧇', '🥞', '🧈', '🍞', '🥐', '🥨', '🧀', '🥗', '🥙', '🥪', '🌮', '🌯', '🫔', '🥫', '🍝', '🍜', '🍲', '🍛', '🍣', '🍱', '🥟', '🍤', '🍙', '🍚', '🍘', '🍥', '🥠', '🍢', '🍡', '🍧', '🍨', '🍦', '🥧', '🧁', '🍰', '🎂', '🍮', '🍭', '🍬', '🍫', '🍩', '🍪', '☕', '🍵', '🧃', '🥤', '🍶', '🍺', '🍻', '🥂', '🍷'],
        objects: ['⚽', '🏀', '🏈', '⚾', '🥎', '🎾', '🏐', '🏉', '🥏', '🎱', '🪀', '🏓', '🏸', '🏒', '🏑', '🥍', '🏏', '🪃', '🥅', '⛳', '🪁', '🏹', '🎣', '🤿', '🥊', '🥋', '🎽', '🛹', '🛼', '🛷', '⛸️', '🥌', '🎿', '⛷️', '🏂', '🎮', '🕹️', '🎲', '🧩', '🎭', '🎨', '🎬', '🎤', '🎧', '🎼', '🎹', '🥁', '🎷', '🎺', '🎸', '🪕', '🎻'],
        symbols: ['✅', '❌', '❓', '❗', '💯', '🔥', '⭐', '🌟', '✨', '💫', '💥', '💢', '💦', '💨', '🕳️', '💣', '💬', '👁️‍🗨️', '🗨️', '🗯️', '💭', '💤', '🔔', '🔕', '🎵', '🎶', '💰', '💴', '💵', '💶', '💷', '💸', '💳', '🔑', '🗝️', '🔨', '🪓', '⛏️', '⚒️', '🛠️', '🔧', '🔩', '⚙️', '🧲', '💊', '💉', '🩸', '🧬', '🦠', '🧫', '🧪', '🌡️', '🔬', '🔭', '📡']
    };
    
    document.addEventListener('DOMContentLoaded', function() {
        var emojiToggle = document.getElementById('emoji-toggle');
        var emojiPicker = document.getElementById('emoji-picker');
        var emojiGrid = document.getElementById('emoji-grid');
        var emojiClose = document.getElementById('emoji-close');
        var textarea = document.getElementById('post-content');
        
        if (emojiToggle && emojiPicker && emojiGrid && textarea) {
            loadEmojis('smileys');
            
            emojiToggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'block' : 'none';
            });
            
            if (emojiClose) {
                emojiClose.addEventListener('click', function() {
                    emojiPicker.style.display = 'none';
                });
            }
            
            document.querySelectorAll('.emoji-cat-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.emoji-cat-btn').forEach(function(b) {
                        b.classList.remove('active');
                    });
                    this.classList.add('active');
                    loadEmojis(this.getAttribute('data-category'));
                });
            });
            
            document.addEventListener('click', function(e) {
                if (!emojiPicker.contains(e.target) && e.target !== emojiToggle) {
                    emojiPicker.style.display = 'none';
                }
            });
        }
        
        function loadEmojis(category) {
            if (!emojiGrid || !emojiData[category]) return;
            emojiGrid.innerHTML = '';
            emojiData[category].forEach(function(emoji) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'emoji-btn';
                btn.textContent = emoji;
                btn.addEventListener('click', function() {
                    insertEmoji(emoji);
                });
                emojiGrid.appendChild(btn);
            });
        }
        
        function insertEmoji(emoji) {
            if (!textarea) return;
            var cursorPos = textarea.selectionStart;
            var textBefore = textarea.value.substring(0, cursorPos);
            var textAfter = textarea.value.substring(textarea.selectionEnd);
            textarea.value = textBefore + emoji + textAfter;
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = cursorPos + emoji.length;
        }
    });
    </script>
</body>
</html>
